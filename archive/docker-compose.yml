# Local stack for the Voice AI Prototype.
#   docker compose up        → scheduler (Go) + backend (Python) + datastores
# The two app services build from their own Dockerfiles; datastores are stock images.
services:
  scheduler:
    build: ./scheduler
    env_file: .env
    ports:
      - "8080:8080"          # Twilio webhook (POST /voice) + health
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

  backend:
    build: ./backend
    env_file: .env
    ports:
      - "8000:8000"          # FastAPI: /media WebSocket + /healthz
      - "50051:50051"        # gRPC Orchestrator server
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      falkordb:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: voiceai
      POSTGRES_PASSWORD: voiceai
      POSTGRES_DB: voiceai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voiceai"]
      interval: 5s
      timeout: 3s
      retries: 10

  # FalkorDB is a Redis-protocol graph DB; Mem0g (graph memory) targets it for
  # per-user graph isolation. Optional — only used when MEM0_GRAPH_ENABLED=true.
  falkordb:
    image: falkordb/falkordb:latest
    ports:
      - "6380:6379"          # host 6380 to avoid clashing with redis below
    volumes:
      - falkordata:/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]

volumes:
  pgdata:
  falkordata:
