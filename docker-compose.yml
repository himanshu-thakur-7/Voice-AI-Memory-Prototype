# Local dev stack for the LiveKit Cognitive Agent.
#
#   docker compose up    →   Neo4j (browser :7474), Redis (:6379), LiveKit server (dev mode, :7880).
#
# LiveKit dev keys match .env.example exactly so `python agent.py dev` registers immediately.

services:
  neo4j:
    image: neo4j:5.20
    container_name: cognitive-neo4j
    ports:
      - "7474:7474"   # browser UI
      - "7687:7687"   # bolt
    environment:
      NEO4J_AUTH: "neo4j/cognitive-dev-password"
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p cognitive-dev-password 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6

  redis:
    image: redis:7-alpine
    container_name: cognitive-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  livekit:
    # LiveKit server in dev mode — accepts the same devkey/devsecret as .env.example.
    image: livekit/livekit-server:latest
    container_name: cognitive-livekit
    command: ["--dev"]
    ports:
      - "7880:7880"   # WebSocket / signaling
      - "7881:7881"   # TCP fallback
      - "7882:7882/udp"  # WebRTC media
    environment:
      LIVEKIT_KEYS: "devkey: devsecret123456789012345678901234"

volumes:
  neo4j_data:
  neo4j_logs:
